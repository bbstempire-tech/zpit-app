<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Zpit — Unidad de Razonamiento</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: #0B1220;
    background-image:
      linear-gradient(rgba(62,124,177,0.14) 1px, transparent 1px),
      linear-gradient(90deg, rgba(62,124,177,0.14) 1px, transparent 1px);
    background-size: 24px 24px;
    font-family: 'Inter', system-ui, sans-serif;
    color: #E8EDF2;
    display: flex;
    justify-content: center;
    padding: 24px 12px;
  }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .app { width: 100%; max-width: 640px; display: flex; flex-direction: column; height: 92vh; }
  .header {
    border: 1px solid #3E7CB1;
    border-radius: 2px;
    padding: 14px 18px;
    margin-bottom: 14px;
    position: relative;
    background: rgba(28,43,58,0.55);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .corner { position: absolute; width: 8px; height: 8px; border-color: #3E7CB1; }
  .header .label { font-size: 11px; letter-spacing: 3px; color: #7FA8C9; margin-bottom: 4px; }
  .header .title { font-size: 26px; font-weight: 700; letter-spacing: 1px; }
  .status { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #9FD4A3; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #9FD4A3; box-shadow: 0 0 6px #9FD4A3; display: inline-block; }
  .log {
    flex: 1;
    overflow-y: auto;
    border: 1px solid #1C2B3A;
    border-radius: 2px;
    padding: 16px;
    background: rgba(11,18,32,0.6);
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .empty { color: #5A7690; font-size: 13px; text-align: center; margin-top: 40px; }
  .msg-row { display: flex; flex-direction: column; }
  .msg-row.user { align-items: flex-end; }
  .msg-row.assistant { align-items: flex-start; }
  .msg-label { font-size: 10px; letter-spacing: 2px; margin-bottom: 4px; }
  .msg-label.user { color: #D98E4A; }
  .msg-label.assistant { color: #7FA8C9; }
  .bubble {
    max-width: 88%;
    padding: 10px 14px;
    border-radius: 2px;
    white-space: pre-wrap;
    line-height: 1.5;
    font-size: 14.5px;
  }
  .bubble.user { border: 1px solid #D98E4A55; background: rgba(217,142,74,0.08); }
  .bubble.assistant { border: 1px solid #3E7CB155; background: rgba(62,124,177,0.08); }
  .thinking { font-size: 12px; color: #7FA8C9; }
  .input-row { display: flex; gap: 8px; margin-top: 12px; }
  textarea {
    flex: 1;
    resize: none;
    background: rgba(28,43,58,0.55);
    border: 1px solid #3E7CB1;
    border-radius: 2px;
    color: #E8EDF2;
    padding: 10px 12px;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 14.5px;
    outline: none;
  }
  button {
    background: #D98E4A;
    border: none;
    border-radius: 2px;
    color: #0B1220;
    font-weight: 700;
    padding: 0 18px;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: 1px;
  }
  button:disabled { cursor: not-allowed; opacity: 0.6; }
  .bubble.assistant h1, .bubble.assistant h2, .bubble.assistant h3 {
    margin: 12px 0 6px; font-size: 1.05em; color: #E8EDF2;
  }
  .bubble.assistant p { margin: 6px 0; }
  .bubble.assistant strong { color: #9FD4A3; }
  .bubble.assistant ul, .bubble.assistant ol { margin: 6px 0; padding-left: 20px; }
  .bubble.assistant li { margin: 3px 0; }
  .bubble.assistant code {
    background: rgba(62,124,177,0.15); padding: 2px 5px; border-radius: 2px;
    font-family: 'JetBrains Mono', monospace; font-size: 0.9em;
  }
  .bubble.assistant pre {
    background: rgba(11,18,32,0.8); padding: 10px; border-radius: 2px;
    overflow-x: auto; border: 1px solid #1C2B3A;
  }
  .bubble.assistant pre code { background: none; padding: 0; }
  .bubble.assistant hr { border-color: #1C2B3A; margin: 10px 0; }
</style>
</head>
<body>
  <div class="app">
    <div class="header">
      <span class="corner" style="top:-1px;left:-1px;border-top:1px solid;border-left:1px solid;"></span>
      <span class="corner" style="top:-1px;right:-1px;border-top:1px solid;border-right:1px solid;"></span>
      <span class="corner" style="bottom:-1px;left:-1px;border-bottom:1px solid;border-left:1px solid;"></span>
      <span class="corner" style="bottom:-1px;right:-1px;border-bottom:1px solid;border-right:1px solid;"></span>
      <div>
        <div class="label mono">UNIDAD DE RAZONAMIENTO</div>
        <div class="title">ZPIT</div>
      </div>
      <div class="status mono"><span class="dot"></span>EN LÍNEA</div>
    </div>

    <div class="log" id="log">
      <div class="empty mono">[ SISTEMA LISTO — PLANTEA UN PROBLEMA PARA COMENZAR EL ANÁLISIS ]</div>
    </div>

    <div class="input-row">
      <textarea id="input" rows="1" placeholder="Escribe tu problema o pregunta..."></textarea>
      <button id="sendBtn">ENVIAR</button>
    </div>
  </div>

<script>
  const log = document.getElementById('log');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  let messages = [];
  let loading = false;

  function render() {
    log.innerHTML = '';
    if (messages.length === 0) {
      log.innerHTML = '<div class="empty mono">[ SISTEMA LISTO — PLANTEA UN PROBLEMA PARA COMENZAR EL ANÁLISIS ]</div>';
    }
    for (const m of messages) {
      const row = document.createElement('div');
      row.className = 'msg-row ' + m.role;
      const label = document.createElement('div');
      label.className = 'msg-label mono ' + m.role;
      label.textContent = m.role === 'user' ? 'TÚ' : 'ZPIT · SALIDA';
      const bubble = document.createElement('div');
      bubble.className = 'bubble ' + m.role;
      if (m.role === 'assistant' && window.marked) {
        bubble.innerHTML = marked.parse(m.content);
      } else {
        bubble.textContent = m.content;
      }
      row.appendChild(label);
      row.appendChild(bubble);
      log.appendChild(row);
    }
    if (loading) {
      const p = document.createElement('div');
      p.className = 'thinking mono';
      p.textContent = 'ZPIT está procesando…';
      log.appendChild(p);
    }
    log.scrollTop = log.scrollHeight;
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text || loading) return;
    messages.push({ role: 'user', content: text });
    input.value = '';
    loading = true;
    render();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages })
      });
      const data = await res.json();
      messages.push({ role: 'assistant', content: data.reply || 'No pude generar una respuesta.' });
    } catch (e) {
      messages.push({ role: 'assistant', content: 'Error de conexión. Intenta de nuevo.' });
    } finally {
      loading = false;
      render();
    }
  }

  sendBtn.addEventListener('click', sendMessage);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
</script>
</body>
</html>
