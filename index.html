<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Zpit — Unidad de Razonamiento</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: #2E2610;
    background-image:
      linear-gradient(rgba(201,162,39,0.14) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,162,39,0.14) 1px, transparent 1px);
    background-size: 24px 24px;
    font-family: 'Inter', system-ui, sans-serif;
    color: #F2E9C9;
    display: flex;
    justify-content: center;
    padding: 24px 12px;
  }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .app { width: 100%; max-width: 640px; display: flex; flex-direction: column; height: 92vh; position: relative; }
  .header {
    border: 1px solid #C9A227;
    border-radius: 2px;
    padding: 14px 18px;
    margin-bottom: 14px;
    position: relative;
    background: rgba(61,50,24,0.65);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .corner { position: absolute; width: 8px; height: 8px; border-color: #C9A227; }
  .header .label { font-size: 11px; letter-spacing: 3px; color: #D9BA5C; margin-bottom: 4px; }
  .header .titlerow { display: flex; align-items: center; gap: 10px; }
  .header .title { font-size: 26px; font-weight: 700; letter-spacing: 1px; color: #F2E9C9; }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .icon-btn {
    background: none; border: 1px solid #C9A22755; color: #D9BA5C;
    width: 32px; height: 32px; border-radius: 2px; cursor: pointer;
    font-size: 16px; display: flex; align-items: center; justify-content: center;
  }
  .clear-btn {
    background: none; border: 1px solid #C9A22755; color: #D9BA5C;
    font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 1px;
    padding: 4px 8px; border-radius: 2px; cursor: pointer;
  }
  .status { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #B7D46A; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #B7D46A; box-shadow: 0 0 6px #B7D46A; display: inline-block; }
  .log {
    flex: 1;
    overflow-y: auto;
    border: 1px solid #4A3D18;
    border-radius: 2px;
    padding: 16px;
    background: rgba(46,38,16,0.6);
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .empty { color: #8A7947; font-size: 13px; text-align: center; margin-top: 40px; }
  .msg-row { display: flex; flex-direction: column; }
  .msg-row.user { align-items: flex-end; }
  .msg-row.assistant { align-items: flex-start; }
  .msg-label { font-size: 10px; letter-spacing: 2px; margin-bottom: 4px; }
  .msg-label.user { color: #D97D25; }
  .msg-label.assistant { color: #D9BA5C; }
  .bubble {
    max-width: 88%;
    padding: 10px 14px;
    border-radius: 2px;
    white-space: pre-wrap;
    line-height: 1.5;
    font-size: 14.5px;
  }
  .bubble.user { border: 1px solid #D97D2555; background: rgba(217,125,37,0.10); }
  .bubble.assistant { border: 1px solid #C9A22755; background: rgba(201,162,39,0.10); }
  .bubble img.attached { max-width: 100%; border-radius: 4px; margin-top: 6px; display: block; }
  .thinking { font-size: 12px; color: #D9BA5C; }
  .input-row { display: flex; gap: 8px; margin-top: 12px; align-items: flex-end; }
  .attach-btn {
    background: rgba(201,162,39,0.12);
    border: 1px solid #C9A227;
    border-radius: 2px;
    color: #D9BA5C;
    width: 40px;
    height: 40px;
    flex-shrink: 0;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  textarea {
    flex: 1;
    resize: none;
    background: rgba(61,50,24,0.65);
    border: 1px solid #C9A227;
    border-radius: 2px;
    color: #F2E9C9;
    padding: 10px 12px;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 14.5px;
    outline: none;
  }
  button.send {
    background: #D97D25;
    border: none;
    border-radius: 2px;
    color: #2E2610;
    font-weight: 700;
    padding: 0 18px;
    height: 40px;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: 1px;
  }
  button:disabled { cursor: not-allowed; opacity: 0.6; }
  .preview-row {
    display: flex; align-items: center; gap: 8px;
    margin-top: 8px; padding: 6px 10px;
    border: 1px solid #C9A22755; border-radius: 2px;
    background: rgba(201,162,39,0.08); font-size: 12.5px; color: #D9BA5C;
  }
  .preview-row img { width: 32px; height: 32px; object-fit: cover; border-radius: 2px; }
  .preview-row .remove { margin-left: auto; cursor: pointer; color: #D97D25; font-weight: 700; }
  .bubble.assistant h1, .bubble.assistant h2, .bubble.assistant h3 {
    margin: 12px 0 6px; font-size: 1.05em; color: #F2E9C9;
  }
  .bubble.assistant p { margin: 6px 0; }
  .bubble.assistant strong { color: #B7D46A; }
  .bubble.assistant ul, .bubble.assistant ol { margin: 6px 0; padding-left: 20px; }
  .bubble.assistant li { margin: 3px 0; }
  .bubble.assistant code {
    background: rgba(201,162,39,0.15); padding: 2px 5px; border-radius: 2px;
    font-family: 'JetBrains Mono', monospace; font-size: 0.9em;
  }
  .bubble.assistant pre {
    background: rgba(46,38,16,0.8); padding: 10px; border-radius: 2px;
    overflow-x: auto; border: 1px solid #4A3D18;
  }
  .bubble.assistant pre code { background: none; padding: 0; }
  .bubble.assistant hr { border-color: #4A3D18; margin: 10px 0; }
  table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 13.5px; }
  th, td { border: 1px solid #4A3D18; padding: 6px 8px; text-align: left; }
  th { background: rgba(201,162,39,0.12); }

  .overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(10,8,3,0.75);
    display: none;
    z-index: 10;
  }
  .overlay.open { display: block; }
  .chat-panel {
    position: absolute; top: 0; left: 0; bottom: 0;
    width: 82%; max-width: 320px;
    background: #2E2610;
    border-right: 1px solid #C9A227;
    display: flex; flex-direction: column;
    padding: 16px 12px;
  }
  .chat-panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .new-chat-btn {
    background: #D97D25; border: none; color: #2E2610; font-weight: 700;
    border-radius: 2px; padding: 8px 12px; font-family: 'JetBrains Mono', monospace;
    font-size: 12px; cursor: pointer; width: 100%; margin-bottom: 10px;
  }
  .chat-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
  .chat-item {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 10px; border-radius: 2px; cursor: pointer;
    border: 1px solid transparent; color: #D9BA5C; font-size: 13px;
  }
  .chat-item.active { background: rgba(201,162,39,0.15); border-color: #C9A22755; color: #F2E9C9; }
  .chat-item span.title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .chat-item .del { color: #D97D25; font-weight: 700; padding: 0 4px; }
</style>
</head>
<body>
  <div class="app">
    <div class="header">
      <span class="corner" style="top:-1px;left:-1px;border-top:1px solid;border-left:1px solid;"></span>
      <span class="corner" style="top:-1px;right:-1px;border-top:1px solid;border-right:1px solid;"></span>
      <span class="corner" style="bottom:-1px;left:-1px;border-bottom:1px solid;border-left:1px solid;"></span>
      <span class="corner" style="bottom:-1px;right:-1px;border-bottom:1px solid;border-right:1px solid;"></span>
      <div class="header-left">
        <button class="icon-btn" id="menuBtn" title="Tus chats">☰</button>
        <div>
          <div class="label mono">UNIDAD DE RAZONAMIENTO</div>
          <div class="titlerow">
            <div class="title">ZPIT</div>
            <button class="clear-btn" id="clearBtn">BORRAR</button>
          </div>
        </div>
      </div>
      <div class="status mono"><span class="dot"></span>EN LÍNEA</div>
    </div>

    <div class="log" id="log">
      <div class="empty mono">[ SISTEMA LISTO — PLANTEA UN PROBLEMA PARA COMENZAR EL ANÁLISIS ]</div>
    </div>

    <div id="previewArea"></div>

    <div class="input-row">
      <button class="attach-btn" id="attachBtn" title="Adjuntar foto o archivo">📎</button>
      <input type="file" id="fileInput" accept="image/*,.txt" style="display:none" />
      <textarea id="input" rows="1" placeholder="Escribe tu problema o pregunta..."></textarea>
      <button class="send" id="sendBtn">ENVIAR</button>
    </div>

    <div class="overlay" id="overlay">
      <div class="chat-panel">
        <div class="chat-panel-header">
          <div class="mono" style="font-size:12px;letter-spacing:2px;color:#D9BA5C;">TUS CHATS</div>
          <button class="icon-btn" id="closePanelBtn">✕</button>
        </div>
        <button class="new-chat-btn" id="newChatBtn">+ NUEVO CHAT</button>
        <div class="chat-list" id="chatList"></div>
      </div>
    </div>
  </div>

<script>
  const log = document.getElementById('log');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const clearBtn = document.getElementById('clearBtn');
  const attachBtn = document.getElementById('attachBtn');
  const fileInput = document.getElementById('fileInput');
  const previewArea = document.getElementById('previewArea');
  const menuBtn = document.getElementById('menuBtn');
  const closePanelBtn = document.getElementById('closePanelBtn');
  const overlay = document.getElementById('overlay');
  const newChatBtn = document.getElementById('newChatBtn');
  const chatList = document.getElementById('chatList');

  const CONVOS_KEY = 'zpit_conversations';
  const ACTIVE_KEY = 'zpit_active_id';

  let conversations = [];
  let activeId = null;
  let loading = false;
  let pendingImage = null;

  function loadConversations() {
    try {
      const saved = localStorage.getItem(CONVOS_KEY);
      conversations = saved ? JSON.parse(saved) : [];
    } catch (e) {
      conversations = [];
    }
    activeId = localStorage.getItem(ACTIVE_KEY);

    if (conversations.length === 0) {
      createConversation();
    } else if (!activeId || !conversations.find((c) => c.id === activeId)) {
      activeId = conversations[0].id;
    }
  }

  function saveConversations() {
    try {
      localStorage.setItem(CONVOS_KEY, JSON.stringify(conversations));
      localStorage.setItem(ACTIVE_KEY, activeId);
    } catch (e) {}
  }

  function getActiveConvo() {
    return conversations.find((c) => c.id === activeId);
  }

  function createConversation() {
    const convo = { id: 'c_' + Date.now(), title: 'Nuevo chat', messages: [] };
    conversations.unshift(convo);
    activeId = convo.id;
    saveConversations();
  }

  function switchConversation(id) {
    activeId = id;
    saveConversations();
    renderChatList();
    render();
    overlay.classList.remove('open');
  }

  function deleteConversation(id, e) {
    e.stopPropagation();
    conversations = conversations.filter((c) => c.id !== id);
    if (conversations.length === 0) {
      createConversation();
    } else if (activeId === id) {
      activeId = conversations[0].id;
    }
    saveConversations();
    renderChatList();
    render();
  }

  function renderChatList() {
    chatList.innerHTML = '';
    for (const c of conversations) {
      const item = document.createElement('div');
      item.className = 'chat-item' + (c.id === activeId ? ' active' : '');
      const title = document.createElement('span');
      title.className = 'title';
      title.textContent = c.title || 'Nuevo chat';
      const del = document.createElement('span');
      del.className = 'del';
      del.textContent = '✕';
      del.onclick = (e) => deleteConversation(c.id, e);
      item.appendChild(title);
      item.appendChild(del);
      item.onclick = () => switchConversation(c.id);
      chatList.appendChild(item);
    }
  }

  function renderPreview() {
    previewArea.innerHTML = '';
    if (!pendingImage) return;
    const row = document.createElement('div');
    row.className = 'preview-row mono';
    const img = document.createElement('img');
    img.src = pendingImage.previewUrl;
    const label = document.createElement('span');
    label.textContent = 'Imagen adjunta';
    const remove = document.createElement('span');
    remove.className = 'remove';
    remove.textContent = '✕';
    remove.onclick = () => { pendingImage = null; renderPreview(); };
    row.appendChild(img);
    row.appendChild(label);
    row.appendChild(remove);
    previewArea.appendChild(row);
  }

  function render() {
    const convo = getActiveConvo();
    const messages = convo ? convo.messages : [];
    log.innerHTML = '';
    if (messages.length === 0) {
      log.innerHTML = '<div class="empty mono">[ SISTEMA LISTO — PLANTEA UN PROBLEMA PARA COMENZAR EL ANÁLISIS ]</div>';
    }
    for (const m of messages) {
      const row = document.createElement('div');
      row.className = 'msg-row ' + m.role;
      const label = document.createElement('div');
      label.className = 'msg-label mono ' + m.role;
      label.textContent = m.role === 'user' ? 'TÚ' : 'ZPIT · SALIDA';
      const bubble = document.createElement('div');
      bubble.className = 'bubble ' + m.role;
      if (m.role === 'assistant' && window.marked) {
        bubble.innerHTML = marked.parse(m.content || '');
      } else {
        bubble.textContent = m.content;
      }
      if (m.image && m.image.data && m.image.mimeType) {
        const img = document.createElement('img');
        img.className = 'attached';
        img.src = `data:${m.image.mimeType};base64,${m.image.data}`;
        bubble.appendChild(img);
      }
      row.appendChild(label);
      row.appendChild(bubble);
      log.appendChild(row);
    }
    if (loading) {
      const p = document.createElement('div');
      p.className = 'thinking mono';
      p.textContent = 'ZPIT está pensando…';
      log.appendChild(p);
    }
    log.scrollTop = log.scrollHeight;
  }

  attachBtn.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    if (!file) return;
    fileInput.value = '';

    if (file.type.startsWith('image/')) {
      const reader = new FileReader();
      reader.onload = () => {
        const dataUrl = reader.result;
        const base64 = dataUrl.split(',')[1];
        pendingImage = { mimeType: file.type, data: base64, previewUrl: dataUrl };
        renderPreview();
      };
      reader.readAsDataURL(file);
    } else if (file.type === 'text/plain' || file.name.endsWith('.txt')) {
      const reader = new FileReader();
      reader.onload = () => {
        input.value = (input.value ? input.value + '\n\n' : '') + `[Contenido del archivo ${file.name}]:\n${reader.result}`;
      };
      reader.readAsText(file);
    } else {
      alert('Por ahora solo se pueden adjuntar imágenes o archivos .txt.');
    }
  });

  async function sendMessage() {
    const text = input.value.trim();
    if ((!text && !pendingImage) || loading) return;

    const convo = getActiveConvo();
    if (!convo) return;

    const userMsg = { role: 'user', content: text };
    if (pendingImage) {
      userMsg.image = { mimeType: pendingImage.mimeType, data: pendingImage.data };
    }
    convo.messages.push(userMsg);

    if (convo.title === 'Nuevo chat' && text) {
      convo.title = text.length > 40 ? text.slice(0, 40) + '…' : text;
    }

    input.value = '';
    pendingImage = null;
    renderPreview();
    loading = true;
    render();
    renderChatList();
    saveConversations();

    const assistantMsg = { role: 'assistant', content: '' };
    convo.messages.push(assistantMsg);

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: convo.messages.slice(0, -1) })
      });

      if (!res.ok || !res.body) {
        assistantMsg.content = 'Error de conexión. Intenta de nuevo.';
        loading = false;
        render();
        saveConversations();
        return;
      }

      loading = false;
      const reader = res.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value, { stream: true });
        assistantMsg.content += chunk;
        render();
      }

      if (!assistantMsg.content) {
        assistantMsg.content = 'No pude generar una respuesta.';
        render();
      }
      saveConversations();
    } catch (e) {
      assistantMsg.content = 'Error de conexión. Intenta de nuevo.';
      loading = false;
      render();
      saveConversations();
    }
  }

  clearBtn.addEventListener('click', () => {
    const convo = getActiveConvo();
    if (!convo) return;
    convo.messages = [];
    convo.title = 'Nuevo chat';
    saveConversations();
    renderChatList();
    render();
  });

  menuBtn.addEventListener('click', () => {
    renderChatList();
    overlay.classList.add('open');
  });
  closePanelBtn.addEventListener('click', () => overlay.classList.remove('open'));
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.classList.remove('open'); });

  newChatBtn.addEventListener('click', () => {
    createConversation();
    renderChatList();
    render();
    overlay.classList.remove('open');
  });

  sendBtn.addEventListener('click', sendMessage);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  loadConversations();
  render();
</script>
</body>
       </html>
